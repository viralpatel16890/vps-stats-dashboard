server {
    listen 80;
    server_name stats.viralpatelstudio.in;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3510/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Frontend (UI)
    location / {
        proxy_pass http://172.19.0.6:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https: blob:; connect-src 'self' https: wss:;" always;
    }
}

server {
    listen 443 ssl;
    server_name stats.viralpatelstudio.in;

    ssl_certificate /etc/letsencrypt/live/stats.viralpatelstudio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.viralpatelstudio.in/privkey.pem;

    # Backend API
    location /api/ {
